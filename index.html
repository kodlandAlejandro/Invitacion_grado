<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación - Alejandro</title>
    <style>
        :root {
            --dorado: #d4af37;
            --negro: #1a1a1a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--negro);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            /* Eliminamos el overflow hidden para permitir scroll si la imagen es grande */
            overflow-y: auto; 
        }

        #contenedor-principal {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 20px;
        }

        input {
            width: 90%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 2px solid var(--dorado);
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .btn {
            background-color: var(--dorado);
            color: black;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: inline-block;
        }

        #pantalla-invitacion { display: none; }

        .img-invitacion {
            width: 100%;
            /* Ajustamos altura máxima para que no empuje tanto el botón */
            max-height: 70vh; 
            object-fit: contain;
            border-radius: 15px;
            margin: 15px 0;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
        }

        #area-boton {
            padding: 20px 0 50px 0; /* Espacio extra abajo para que sea fácil de tocar */
            min-height: 120px;
            position: relative;
        }

        #boton-asistir {
            z-index: 9999;
            touch-action: none;
        }
    </style>
</head>
<body>

<div id="contenedor-principal">
    <div id="pantalla-nombre">
        <h1 style="color: var(--dorado); margin-top: 50px;">¡Hola!</h1>
        <p>Escribe tu nombre para continuar:</p>
        <input type="text" id="input-nombre" placeholder="Tu nombre..." autocomplete="off">
        <br>
        <button class="btn" onclick="iniciar()">Entrar</button>
    </div>

    <div id="pantalla-invitacion">
        <h2 id="saludo" style="color: var(--dorado); margin-bottom: 5px;"></h2>
        <p style="margin-top: 0;">Estás invitado a mi grado</p>
        
        <img src="invitacion.png" alt="Invitación" class="img-invitacion">

        <div id="area-boton">
            <button id="boton-asistir" class="btn" 
                    onmouseover="escapar()" 
                    ontouchstart="escapar(event)" 
                    onclick="finalizar()">
                ¡Asistiré!
            </button>
        </div>
    </div>
</div>

<script>
    let bromaRealizada = 0;
    const limiteBroma = 3;

    function iniciar() {
        const nombre = document.getElementById('input-nombre').value;
        if(nombre.trim() === "") return alert("Por favor escribe tu nombre");
        
        document.getElementById('pantalla-nombre').style.display = 'none';
        document.getElementById('pantalla-invitacion').style.display = 'block';
        document.getElementById('saludo').innerText = "¡Hola, " + nombre + "!";
    }

    function escapar(e) {
        if (bromaRealizada < limiteBroma) {
            // Si es evento táctil, prevenimos el click accidental
            if(e && e.type === 'touchstart') e.preventDefault();

            const btn = document.getElementById('boton-asistir');
            
            // Calculamos posiciones aleatorias dentro de la pantalla visible
            const x = Math.random() * (window.innerWidth - btn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - btn.offsetHeight - 40) + 20;

            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            
            bromaRealizada++;
        }
    }

    function finalizar() {
        if (bromaRealizada >= limiteBroma) {
            alert("¡Tienes ganas de venir! 😂 Gracias por confirmar, ¡te espero!");
            const btn = document.getElementById('boton-asistir');
            btn.style.position = 'relative';
            btn.style.left = '0';
            btn.style.top = '0';
        }
    }
</script>

</body>
</html>
