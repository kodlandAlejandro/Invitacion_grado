<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación Alejandro</title>
    <style>
        :root { --dorado: #d4af37; --negro: #1a1a1a; }
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--negro);
            color: white;
            font-family: sans-serif;
            overflow-x: hidden; /* Permite scroll vertical si la imagen es grande */
        }

        #contenedor-principal {
            width: 100%;
            max-width: 400px;
            margin: auto;
            text-align: center;
            padding: 20px;
        }

        input {
            width: 80%; padding: 15px; margin-bottom: 20px;
            border-radius: 8px; border: 2px solid var(--dorado);
            background: #222; color: white; font-size: 16px;
        }

        .btn {
            background-color: var(--dorado); color: black;
            border: none; padding: 15px 30px;
            font-weight: bold; border-radius: 8px;
            font-size: 18px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: inline-block;
        }

        #pantalla-invitacion { display: none; }

        .img-invitacion {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        /* Área dedicada al botón para que no se pierda */
        #zona-segura-boton {
            width: 100%;
            height: 150px; /* Espacio garantizado */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            position: relative;
        }

        #boton-asistir {
            z-index: 999;
            touch-action: none;
            position: relative; /* Empieza estando ahí siempre */
        }
    </style>
</head>
<body>

<div id="contenedor-principal">
    <div id="pantalla-nombre">
        <h1 style="color: var(--dorado)">¡Hola!</h1>
        <p>Escribe tu nombre para entrar:</p>
        <input type="text" id="input-nombre" placeholder="Tu nombre..." autocomplete="off">
        <br>
        <button class="btn" onclick="iniciar()">Entrar</button>
    </div>

    <div id="pantalla-invitacion">
        <h2 id="saludo" style="color: var(--dorado); margin: 0;"></h2>
        <img src="invitacion.png" alt="Invitación" class="img-invitacion">

        <div id="zona-segura-boton">
            <button id="boton-asistir" class="btn" 
                    onmouseover="escapar()" 
                    ontouchstart="escapar(event)" 
                    onclick="finalizar()">
                ¡Asistiré!
            </button>
        </div>
    </div>
</div>

<script>
    let clicks = 0;

    function iniciar() {
        const nombre = document.getElementById('input-nombre').value;
        if(nombre.trim() === "") return alert("Pon tu nombre");
        document.getElementById('pantalla-nombre').style.display = 'none';
        document.getElementById('pantalla-invitacion').style.display = 'block';
        document.getElementById('saludo').innerText = "¡Hola, " + nombre + "!";
    }

    function escapar(event) {
        if (clicks < 3) {
            // Si es táctil, evitamos que el click ocurra de inmediato
            if(event) event.preventDefault();

            const btn = document.getElementById('boton-asistir');
            
            // Calculamos posiciones dentro de la pantalla visible actual
            const maxX = window.innerWidth - btn.offsetWidth - 20;
            const maxY = window.innerHeight - btn.offsetHeight - 20;

            const x = Math.max(10, Math.random() * maxX);
            const y = Math.max(10, Math.random() * maxY);

            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            
            clicks++;
        }
    }

    function finalizar() {
        if (clicks >= 3) {
            alert("¡Tienes ganas de venir! 😂 Gracias por confirmar, te espero.");
            const btn = document.getElementById('boton-asistir');
            btn.style.position = 'relative';
            btn.style.left = '0';
            btn.style.top = '0';
        }
    }
</script>

</body>
</html>
