<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invitación de Grado - Alejandro</title>
    <style>
        :root {
            --dorado: #d4af37;
            --negro: #1a1a1a;
        }

        /* Configuración para que ocupe toda la pantalla del cel sin scroll */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--negro);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
        }

        #contenedor-principal {
            text-align: center;
            width: 90%;
            max-width: 450px;
            z-index: 1;
        }

        /* Inputs y Botones */
        input {
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--dorado);
            background: #2a2a2a;
            color: white;
            font-size: 1rem;
            width: 80%;
            margin-bottom: 20px;
            text-align: center;
        }

        .btn-dorado {
            padding: 15px 30px;
            border-radius: 10px;
            border: none;
            background-color: var(--dorado);
            color: black;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        /* Pantallas */
        #pantalla-invitacion {
            display: none;
        }

        .img-invitacion {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            margin: 15px 0;
        }

        /* Contenedor del botón travieso */
        #area-boton {
            position: relative;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #boton-asistir {
            z-index: 9999;
            touch-action: none; /* Importante para móviles */
        }

        h1 { color: var(--dorado); margin: 0 0 10px 0; font-size: 1.8rem; }
        p { margin-bottom: 20px; font-size: 1rem; }
    </style>
</head>
<body>

<div id="contenedor-principal">
    <div id="pantalla-nombre">
        <h1>¡Hola!</h1>
        <p>Escribe tu nombre para ver la invitación:</p>
        <input type="text" id="input-nombre" placeholder="Tu nombre aquí..." autocomplete="off">
        <br>
        <button class="btn-dorado" onclick="mostrarInvitacion()">Entrar</button>
    </div>

    <div id="pantalla-invitacion">
        <h1 id="saludo-personalizado"></h1>
        <p>¡Tengo el gusto de invitarte a mi grado!</p>
        
        <img src="invitacion.png" alt="Invitación de Grado" class="img-invitacion">

        <div id="area-boton">
            <button id="boton-asistir" 
                    class="btn-dorado" 
                    onmouseover="moverBoton()" 
                    ontouchstart="moverBoton()" 
                    onclick="confirmarAsistencia()">
                ¡Asistiré!
            </button>
        </div>
    </div>
</div>

<script>
    let intentos = 0;
    const maxIntentos = 3;

    function mostrarInvitacion() {
        const nombre = document.getElementById('input-nombre').value;
        if (nombre.trim() === "") {
            alert("¡Escribe tu nombre por favor!");
            return;
        }
        document.getElementById('pantalla-nombre').style.display = 'none';
        document.getElementById('pantalla-invitacion').style.display = 'block';
        document.getElementById('saludo-personalizado').innerText = `¡Hola, ${nombre}!`;
    }

    function moverBoton() {
        if (intentos < maxIntentos) {
            const btn = document.getElementById('boton-asistir');
            
            // Calculamos espacio disponible en la pantalla
            const anchoVentana = window.innerWidth;
            const altoVentana = window.innerHeight;

            // Margen de seguridad para que no se salga de los bordes (80px)
            const margen = 80;
            
            const nuevoX = Math.random() * (anchoVentana - btn.offsetWidth - margen) + (margen/2);
            const nuevoY = Math.random() * (altoVentana - btn.offsetHeight - margen) + (margen/2);

            btn.style.position = 'fixed';
            btn.style.left = nuevoX + 'px';
            btn.style.top = nuevoY + 'px';
            btn.style.margin = '0';
            
            intentos++;
        }
    }

    function confirmarAsistencia() {
        if (intentos >= maxIntentos) {
            alert("¡Tienes ganas de venir! 😂 Gracias por confirmar, ¡te espero!");
            // Regresamos el botón a su lugar original si quieres
            const btn = document.getElementById('boton-asistir');
            btn.style.position = 'relative';
            btn.style.left = '0';
            btn.style.top = '0';
        }
    }
</script>

</body>
</html>
